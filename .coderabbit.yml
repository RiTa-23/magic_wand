# CodeRabbit Configuration File
# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: "ja-JP"

reviews:
  # レビューの有効化
  profile: "chill" # 'chill', 'assertive', or 'standard'
  request_changes_workflow: false
  high_level_summary: true
  poem: true
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true

  # レビューの除外設定
  ignore:
    - "node_modules/**"       # 依存関係
    - ".next/**"              # Next.js ビルド成果物
    - ".devbox/**"            # devbox キャッシュ/設定
    - "bun.lock"              # bun のロックファイル
    - "devbox.lock"           # devbox のロックファイル
    - "types/**"              # Next.js の自動生成型定義ファイル (cache-life.d.ts, validator.ts など)
    - "public/**"             # 静的ファイル群

chat:
  auto_reply: true
